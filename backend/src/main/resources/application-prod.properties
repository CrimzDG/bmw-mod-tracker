# Production config
# URL is hardcoded to avoid Railway env var formatting issues
# Only sensitive values (password, jwt secret) come from env vars

spring.datasource.url=jdbc:postgresql://db.oocbzxeiyyftkvnugyts.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

server.port=${PORT:8080}
